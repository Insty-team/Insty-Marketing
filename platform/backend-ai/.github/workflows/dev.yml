name: Insty(개발) AI CI/CD 파이프라인

on:
  push:
    branches:
      - dev
    paths-ignore:
      - .github/workflows/main.yml

env:
  ACTOR: ajroot5685
  DOCKER_IMAGE_NAME: ghcr.io/ajroot5685/insty-backend-ai

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ env.ACTOR }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:latest .
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: [ self-hosted, insty-dev-ai ]

    steps:
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ env.ACTOR }} --password-stdin

      - name: Add Private Files
        run: |
          echo "${{ secrets.DEV_APPLICATION_ENV }}" | base64 --decode > .env
          echo "${{ secrets.DEV_DOCKER_COMPOSE }}" | base64 --decode > docker-compose.yml

      - name: Pull latest image and restart via Docker Compose
        run: |
          docker-compose pull
          docker-compose down ai celery_worker
          docker-compose up -d ai celery_worker

      - name: Cleanup Docker and Cache
        run: |
          docker system prune -af --volumes
#          rm -rf __pycache__ .pytest_cache .mypy_cache

      - name: Check ping
        run: |
          for i in {1..20}; do
            RESPONSE=$(curl -s localhost:8000 || true)

            if echo "$RESPONSE" | grep -q "Not Found"; then
              echo "✅ 애플리케이션 실행 완료"
              exit 0
            fi

            sleep 3
          done

          echo "❌ 애플리케이션 실행 실패"
          exit 1

  notify-success:
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: success
          author_name: AI-개발 파이프라인
          fields: commit,author,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-failure:
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          author_name: AI-개발 파이프라인
          fields: commit,author,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}