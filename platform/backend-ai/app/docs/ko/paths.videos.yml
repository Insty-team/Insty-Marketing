paths:
  ai_videos_transcribe:
    summary: 영상 STT (Transcribe)
    description: >
      음성 인식 모델을 통해 영상의 오디오를 텍스트로 변환합니다.  
      변환된 텍스트는 후속 메타데이터 생성 및 벡터 임베딩에 활용됩니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    parameters:
      - name: video_id
        in: path
        required: true
        description: 영상의 내부 식별자 (DB ID)
        schema:
          type: integer
          example: 6011241
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              file_url:
                type: string
                example: "s3://insty-dev/test_folder/mysql_install.mp4"
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
              data:
                video_id: 6011241
      "500":
        $ref: "#/components/responses/InternalServerError"

  ai_videos_transcription_status:
    summary: STT 상태 조회
    description: >
      영상의 음성 인식(STT) 진행 상태를 Redis에서 조회합니다.  
      진행률(`progress`)과 현재 단계(`step`) 정보를 반환합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    parameters:
      - name: video_uuid
        in: path
        required: true
        schema:
          type: string
          example: "421ee4bf-f842-433d-afaf-08d4c42e73ac"
    responses:
      "200":
        description: 정상 응답
        content:
          application/json:
            example:
              success: true
              data:
                status: "IN_PROGRESS"
                progress: 45
                step: "오디오 추출 중입니다."
      "404":
        description: video_uuid가 존재하지 않을 때
      "500":
        $ref: "#/components/responses/InternalServerError"

  ai_videos_vector_upsert:
    summary: 음성텍스트 임베딩 (Vector Upsert)
    description: >
      변환된 텍스트 데이터를 기반으로 벡터 임베딩을 수행합니다.  
      비동기 Celery 작업으로 처리되며, 완료 여부는 별도의 상태 조회 API로 확인합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    parameters:
      - name: video_uuid
        in: path
        required: true
        schema:
          type: string
          example: "421ee4bf-f842-433d-afaf-08d4c42e73ac"
    responses:
      "200":
        description: 임베딩 작업 시작
        content:
          application/json:
            example:
              success: true
              data: "벡터 임베딩 작업을 시작했습니다."
      "500":
        $ref: "#/components/responses/InternalServerError"

  ai_videos_vector_status:
    summary: 임베딩 상태 조회
    description: >
      벡터 임베딩 작업의 실시간 상태를 확인합니다.  
      Redis에 저장된 진행률 및 단계(`step`)를 반환합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    parameters:
      - name: video_uuid
        in: path
        required: true
        schema:
          type: string
          example: "421ee4bf-f842-433d-afaf-08d4c42e73ac"
    responses:
      "200":
        description: 상태 조회 성공
        content:
          application/json:
            example:
              success: true
              data:
                status: "IN_PROGRESS"
                progress: 45
                step: "벡터 임베딩 중입니다."
      "404":
        description: video_uuid 존재하지 않음
      "500":
        $ref: "#/components/responses/InternalServerError"

  ai_videos_metadata_suggestion:
    summary: AI 기반 영상 초안 생성
    description: >
      변환된 텍스트를 기반으로 영상의 메타데이터(제목, 키워드, 설명 요약 등)를 생성합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    parameters:
      - name: video_uuid
        in: path
        required: true
        schema:
          type: string
          example: "d2e47d78-b3e5-440b-8b8f-a6fe941998a5"
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
              data:
                title: "CUDA 설치법"
                description: "CUDA 설치 방법을 상세히 설명하는 영상입니다."
                tags: ["CUDA", "설치", "개발자"]
      "500":
        $ref: "#/components/responses/InternalServerError"

  ai_videos_suggest_title:
    summary: AI 기반 영상 제목 수정 제안
    description: >
      AI가 제공된 원본 제목을 바탕으로 더 자연스럽고 주목도 높은 제목을 제안합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              video_uuid:
                type: string
                example: "d2e47d78-b3e5-440b-8b8f-a6fe941998a5"
              original_title:
                type: string
                example: "쿠다 설치법"
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
              data:
                title: "만보 안팎! CUDA 설치 완벽 가이드"

  ai_videos_suggest_description:
    summary: AI 기반 영상 설명 수정 제안
    description: >
      AI가 원본 설명을 바탕으로 문체를 다듬고, 더 풍부하고 매력적인 설명을 제안합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              video_uuid:
                type: string
                example: "d2e47d78-b3e5-440b-8b8f-a6fe941998a5"
              original_description:
                type: string
                example: "이 영상은 CUDA를 설치하는 방법에 대해 설명합니다."
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
              data:
                description: "이번 영상에서는 멀티코어 프로그래밍 초급자를 위해 CUDA 설치 과정을 안내합니다."

  ai_videos_suggest_practice_guide:
    summary: AI 기반 실습자료 생성
    description: >
      영상 내용을 분석하여 단계별 실습 가이드를 생성합니다.  
      학습자가 직접 따라 할 수 있도록 명령어, 코드, 예시 등을 포함합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    parameters:
      - name: video_uuid
        in: path
        required: true
        schema:
          type: string
          example: "3ce0c0c6-aa91-41c4-ad5f-d35fe7baf520"
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
              data:
                practice_draft: |
                  # 실습 가이드: CUDA 설치하기
                  1. Visual Studio 설치
                  2. CUDA Toolkit 다운로드
                  3. 환경 변수 설정 및 테스트 코드 실행

  ai_videos_delete:
    summary: 영상 관련 데이터 단일 삭제
    description: >
      영상 관련 데이터(임베딩 벡터, S3 전사 텍스트, is_deleted 업데이트, 채팅 로그 등)를 삭제합니다.  
      이 엔드포인트는 내부 시스템용이며, Authorization 헤더에 내부 토큰이 반드시 포함되어야 합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    parameters:
      - name: video_uuid
        in: path
        required: true
        description: 삭제할 영상의 UUID
        schema:
          type: string
          example: "421ee4bf-f842-433d-afaf-08d4c42e73ac"
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
      "401":
        description: 인증 실패 (내부 토큰 누락 시)
        content:
          application/json:
            example:
              success: false
              error:
                code: AUTH_401
                message: "유효하지 않은 내부 인증 토큰입니다."

  ai_videos_batch_delete:
    summary: 영상 관련 데이터 다중 삭제
    description: >
      여러 개의 영상 UUID를 한 번에 삭제합니다.  
      Authorization 헤더에 내부 시스템 토큰(`insty-internal-secret`)을 포함해야 합니다.
    tags: ["videos"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              video_uuids:
                type: array
                description: 삭제할 영상 UUID 목록
                items:
                  type: string
            example:
              video_uuids:
                - "421ee4bf-f842-433d-afaf-08d4c42e73ac"
                - "12345678-aaaa-bbbb-cccc-1234567890ab"
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
      "401":
        description: 인증 실패
        content:
          application/json:
            example:
              success: false
              error:
                code: AUTH_401
                message: "유효하지 않은 내부 인증 토큰입니다."