  community_generate_answer_draft:
    summary: 답변 초안 생성
    description: |
      AI가 강의 내용을 분석하여 러너의 질문(`query`)에 대한 **답변 초안을 자동 생성**합니다.  
      선택적으로 이미지 파일을 업로드할 수 있으며, 내부 OCR을 통해 이미지 내 텍스트를 분석하여 보다 풍부한 답변을 제공합니다.
      
      ---
      **첨부파일 처리 규칙**
      - 파일을 첨부하려면 `has_attachment: true`와 함께 `files` 필드를 포함해야 합니다.  
      - 허용 확장자 외의 파일은 자동 필터링됩니다.  
      - 이미지의 OCR 처리는 백엔드 내부에서 병렬적으로 수행됩니다.
      
      ---
      **에러 발생 예시**
      - 첨부파일이 손상되었거나 MIME 타입이 허용되지 않은 경우 → `AI_COMMON_005 (INVALID_FILE_TYPE)`  
      - 모델 응답이 비정상적인 형식일 경우 → `AI_COMMON_007 (INVALID_TYPE_PARAMETER)`  
      - 인증 실패 → `AI_COMMON_002 (Unauthorized)`
      
      ---
      **지원 파일 형식**
      | 확장자 | MIME 타입 |
      | --- | --- |
      | `.jpg` / `.jpeg` | `image/jpeg` |
      | `.png` | `image/png` |
      | `.webp` | `image/webp` |
      | `.gif` | `image/gif` |

    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              course_id:
                type: integer
                description: 답변 초안을 생성할 강의의 고유 ID
                example: 123
              query:
                type: string
                description: 답변 생성을 위한 입력 텍스트
                example: "태블릿을 듀얼 모니터처럼 사용할 수 있는 방법이 궁금해요."
              has_attachment:
                type: boolean
                description: 파일 첨부 여부 (기본값 false)
                example: true
              files:
                type: array
                description: 이미지 첨부 파일 (여러 개 가능)
                items:
                  type: string
                  format: binary
    responses:
      "200":
        description: 성공 (답변 초안 생성 완료)
        content:
          application/json:
            example:
              success: true
              data:
                answer_content: "Splashtop Wired XDisplay 앱은 유선 연결을 통해 태블릿을 보조 디스플레이로 사용할 수 있게 해줍니다..."
                has_attachment: false
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_generate_thought_draft:
    summary: 생각 정리 초안 생성
    description: |
      AI가 사용자가 입력한 생각이나 경험을 정돈된 형태로 정리하여 **포스트 초안을 자동 생성**합니다.  
      질문 형식이 아닌, 경험 공유나 인사이트 전달 형식으로 작성됩니다.
      선택적으로 이미지 파일을 업로드하면 OCR(텍스트 추출)을 수행하여, 시각 자료에 담긴 내용을 함께 고려합니다.
      
      ---
      **특징**
      - 강의 관련 벡터 검색을 수행하지 않습니다 (일반적인 생각 정리용)
      - 질문이 아닌 경험 공유나 인사이트 전달 형식으로 작성됩니다
      - 첨부 파일을 전송할 때는 반드시 `has_attachment: true`로 설정해야 합니다
      
      ---
      **첨부파일 처리 규칙**
      - 첨부 파일을 전송할 때는 반드시 `has_attachment: true`로 설정해야 합니다.  
      - 허용 확장자 외 파일(`.jpg`, `.jpeg`, `.png`, `.webp`, `.gif` 이외)은 자동으로 필터링되어 무시됩니다.  
      - `has_attachment: false`일 경우 `files` 필드를 생략해도 됩니다.
      
      ---
      **에러 발생 예시**
      - AI 응답이 유효한 JSON 형식이 아닐 경우 → `AI_COMMON_007 (INVALID_TYPE_PARAMETER)`  
      - 첨부파일 확장자가 잘못된 경우 → `AI_COMMON_005 (INVALID_FILE_TYPE)`  
      - 인증 실패 시 → `AI_COMMON_002 (Unauthorized)`

    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              course_id:
                type: integer
                description: 초안을 생성할 강의의 고유 ID (입력 형식 일관성을 위해 필요하지만, 벡터 검색에는 사용되지 않음)
                example: 27
              query:
                type: string
                description: 생각 정리 초안을 생성하기 위한 입력 텍스트
                example: "처음에 어떻게 하지?"
              has_attachment:
                type: boolean
                description: 파일 첨부 여부 (기본값 false)
                example: false
              files:
                type: array
                description: 이미지 첨부 파일 (여러 개 가능)
                items:
                  type: string
                  format: binary
    responses:
      "200":
        description: 성공 (생각 정리 초안 생성 완료)
        content:
          application/json:
            example:
              success: true
              data:
                post_title: "React Hooks를 사용하면서 배운 성능 최적화 팁"
                post_content: "최근 프로젝트에서 React Hooks를 활용하면서 몇 가지 성능 최적화 방법을 발견했습니다. 특히 useMemo와 useCallback을 적절히 사용하는 것이 중요하다는 것을 깨달았는데, 실제 경험을 공유하고자 합니다..."
                has_attachment: false
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"
