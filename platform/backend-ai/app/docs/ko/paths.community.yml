  community_generate_question_draft:
    summary: 질문 초안 생성
    description: |
      AI가 강의 내용을 분석하여 러너의 입력 문장을 기반으로 **질문 초안을 자동 생성**합니다.  
      선택적으로 이미지 파일을 업로드하면 OCR(텍스트 추출)을 수행하여, 시각 자료에 담긴 내용을 함께 고려합니다.
      
      ---
      **첨부파일 처리 규칙**
      - 첨부 파일을 전송할 때는 반드시 `has_attachment: true`로 설정해야 합니다.  
      - 허용 확장자 외 파일(`.jpg`, `.jpeg`, `.png`, `.webp`, `.gif` 이외)은 자동으로 필터링되어 무시됩니다.
      - `has_attachment: false`일 경우 `files` 필드를 생략해도 됩니다.
      
      ---
      **에러 발생 예시**
      - AI 응답이 유효한 JSON 형식이 아닐 경우 → `AI_COMMON_007 (INVALID_TYPE_PARAMETER)`  
      - 첨부파일 확장자가 잘못된 경우 → `AI_COMMON_005 (INVALID_FILE_TYPE)`  
      - 인증 실패 시 → `AI_COMMON_002 (Unauthorized)`

    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              course_id:
                type: integer
                description: 초안을 생성할 강의의 고유 ID
                example: 456
              query:
                type: string
                description: 질문 초안을 생성하기 위한 입력 텍스트
                example: "파이썬에서 리스트와 튜플의 차이점이 궁금해요."
              has_attachment:
                type: boolean
                description: 파일 첨부 여부 (기본값 false)
                example: false
              files:
                type: array
                description: 이미지 첨부 파일 (여러 개 가능)
                items:
                  type: string
                  format: binary
    responses:
      "200":
        description: 성공 (질문 초안 생성 완료)
        content:
          application/json:
            example:
              success: true
              data:
