paths:
  community_get_course_request_form:
    summary: 강의 요청 폼 조회
    description: |
      러너가 강의를 요청하기 전에 작성해야 하는 요청 폼(form)의 문항 정보를 조회합니다.  
      이 폼은 AI가 강의 추천 및 자동 요약·분류 작업을 수행할 때 사용되는 핵심 입력 데이터로,  
      각 질문은 `field_id`, `field_key`, `label`, `type`, `options` 등의 구조로 구성됩니다.

      ---
      주요 기
      - 러너가 강의 요청을 생성하기 전, 폼의 구조를 프론트엔드에서 렌더링할 수 있도록 제공합니다.
      - 각 질문(`form` 항목)은 표시 순서(`order_no`)에 따라 정렬되어야 하며,  
        선택형 질문(`checkbox`, `radio`)의 경우 `options` 배열에 선택지가 포함됩니다.
      - 직접 입력형(`input_text`, `text_area`)은 `options`가 비어 있습니다.

      ---
      반환 필드 설명 (`form` 배열)
      
      | 필드명 | 타입 | 설명 |
      | --- | --- | --- |
      | `id` | `integer` | 폼 필드의 고유 ID. 사용자가 응답을 제출할 때 `field_id`로 사용됩니다. |
      | `field_key` | `string` | 백엔드에서 질문을 구분하기 위한 내부 키. 예: `"problem_context"`, `"goal"`. 응답 시에는 생략 가능. |
      | `label` | `string` | 실제 사용자에게 보여지는 질문 문구. 예: `"문제 상황/배경을 자세히 적어주세요."` |
      | `type` | `string` | 입력 방식. `radio`(단일 선택), `checkbox`(복수 선택), `input_text`(단답 입력), `text_area`(장문 입력). |
      | `is_required` | `boolean` | 필수 응답 여부. `true`인 경우 반드시 값이 입력되어야 제출 가능. |
      | `order_no` | `integer` | 표시 순서. 작은 값일수록 먼저 표시됩니다. |
      | `options` | `array` | 선택형 질문(`radio`, `checkbox`)에서 선택 가능한 옵션 목록. 각 옵션은 `id`, `label`, `order_no`를 포함합니다. 직접 입력형 질문은 빈 배열입니다. |

      ---
    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            example: {}
    responses:
      "200":
        description: 성공 (폼 문항 반환)
        content:
          application/json:
            example:
              success: true
              data:
                form:
                  - id: 1
                    field_key: "problem_context"
                    label: "문제 상황/배경을 자세히 적어주세요."
                    type: "text_area"
                    is_required: true
                    order_no: 1
                    options: []
                  - id: 2
                    field_key: "goal"
                    label: "이번 강의를 통해 달성하고 싶은 목표를 적어주세요."
                    type: "input_text"
                    is_required: true
                    order_no: 2
                    options: []
                  - id: 3
                    field_key: "current_attempt"
                    label: "지금까지 시도해본 방법이나 막힌 지점을 적어주세요."
                    type: "text_area"
                    is_required: true
                    order_no: 3
                    options: []
                  - id: 4
                    field_key: "ai_usage_level"
                    label: "AI 도구 활용 수준을 선택해주세요."
                    type: "radio"
                    is_required: true
                    order_no: 4
                    options:
                      - id: 1
                        label: "Beginner"
                        order_no: 1
                      - id: 2
                        label: "Basic"
                        order_no: 2
                      - id: 3
                        label: "Intermediate"
                        order_no: 3
                      - id: 4
                        label: "Advanced"
                        order_no: 4
                  - id: 5
                    field_key: "desired_output"
                    label: "원하는 결과물 형태를 적어주세요."
                    type: "input_text"
                    is_required: true
                    order_no: 5
                    options: []
                  - id: 6
                    field_key: "extra_context"
                    label: "추가 맥락/요청사항이 있다면 적어주세요."
                    type: "text_area"
                    is_required: false
                    order_no: 6
                    options: []
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_suggest_lecture_request:
    summary: 강의 요청 주제 제안
    description: |
      AI가 폼 응답을 기반으로 러너의 요청 내용을 자연어로 정리하고,  
      강의 제목(`title`)과 설명(`description`)을 자동 생성합니다.
    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              problem_context:
                type: string
                example: "macOS에서 Docker 기반 개발환경 구성 중 DB 연결이 반복적으로 실패합니다."
              goal:
                type: string
                example: "로컬 개발환경을 안정적으로 구축하고 장애를 재현/해결하는 방법을 익히고 싶습니다."
              current_attempt:
                type: string
                example: "docker compose 설정, 포트 매핑, env 값을 여러 번 수정했지만 연결 실패가 지속됩니다."
              ai_usage_level:
                type: string
                example: "Intermediate"
              desired_output:
                type: string
                example: "초기 구성부터 트러블슈팅까지 재현 가능한 실습형 강의"
              extra_context:
                type: string
                example: "macOS 기준으로 진행하고, 팀 협업 환경(.env 관리)도 포함되면 좋겠습니다."
    responses:
      "200":
        description: 성공 (AI 제안 결과 반환)
        content:
          application/json:
            example:
              success: true
              data:
                title: "Windows에서 MySQL Workbench 설치 및 문제 해결 강의 요청"
                description: >
                  사용자는 Windows 환경에서 MySQL Workbench를 설치하고자 하며,
                  환경변수 설정, 설치 오류, 네트워크 연결 문제와 같은 어려움을 겪고 있습니다.
                  따라서 강의는 설치 과정 전반을 다루며 오류 해결 및 네트워크 설정 관련 내용을 포함해야 합니다.
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_create_course_request:
    summary: 강의 요청 생성
    description: |
      러너가 AI 추천된 내용 또는 직접 작성한 제목·설명을 기반으로  
      실제 강의 요청을 등록합니다.  
      폼 문항(`answers`)의 각 `field_id` 및 `answer_option_ids`, `answer_text`를 함께 전달합니다.
    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              answers:
                type: array
                items:
                  type: object
                  properties:
                    field_id:
                      type: integer
                    answer_option_ids:
                      type: array
                      items:
                        type: integer
                    answer_text:
                      type: string
          examples:
            example1:
              summary: 기본 예시
              value:
                title: "어쩌구 저쩌구 제목 입니다. 강의 요청 드려요"
                description: "제가 원하는 강의는 이런 저런 강의입니다. 만들어줘요"
                answers:
                  - field_id: 1
                    answer_option_ids: [1]
                  - field_id: 2
                    answer_option_ids: [6, 7]
                  - field_id: 3
                    answer_text: "Anaconda"
                  - field_id: 4
                    answer_text: "Docker 설정도 같이 알고 싶어요."
            example2:
              summary: 기타 옵션 포함 예시
              value:
                title: "어쩌구 저쩌구 제목 입니다. 강의 요청 드려요"
                description: "제가 원하는 강의는 이런 저런 강의입니다. 만들어줘요"
                answers:
                  - field_id: 1
                    answer_option_ids: [4]
                    answer_text: "기타를 적어봤습니다 블라블라~~"
                  - field_id: 2
                    answer_option_ids: [6, 10]
                    answer_text: "Poetry 기반 프로젝트 설정도 궁금합니다."
                  - field_id: 3
                    answer_text: "Anaconda"
                  - field_id: 4
                    answer_text: "Docker 설정도 같이 알고 싶어요."
    responses:
      "200":
        description: 성공 (요청 생성 완료)
        content:
          application/json:
            example:
              success: true
              data:
                request_id: 11
                title: "마이크로소프트 계정을 이용한 프로그램 설치 방법 요청"
                description: "MS 계정을 연동해서 Office나 Teams 같은 프로그램을 설치하는 과정이 헷갈려요."
                requests_status: "COMPLETED"
                created_at: "2025-09-07T03:57:54.976166Z"
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_get_my_course_requests:
    summary: 내 강의 요청 목록 조회
    description: |
      로그인된 사용자가 제출한 모든 강의 요청 목록을 조회합니다.  
      각 요청의 처리 상태(`requests_status`) 및 크리에이터 반응 상태(`action_status`)를 포함합니다.
    tags: ["community"]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: 성공 (요청 목록 반환)
        content:
          application/json:
            example:
              success: true
              data:
                - request_id: 10
                  title: "Git 설치와 기본 사용법을 배우고 싶어요"
                  description: "Git 설치부터 커밋, 브랜치까지 한 번에 배우고 싶습니다."
                  requests_status: "COMPLETED"
                  action_status: "NOT_RECOMMENDED"
                  action_at: null
                  created_at: "2025-09-07T03:56:38.929429Z"
                - request_id: 11
                  title: "마이크로소프트 계정을 이용한 프로그램 설치 방법 요청"
                  description: "MS 계정을 연동해서 Office나 Teams 같은 프로그램을 설치하는 과정이 헷갈려요."
                  requests_status: "COMPLETED"
                  action_status: "IGNORED"
                  action_at: "2025-09-07T09:48:34.629929Z"
                  created_at: "2025-09-07T03:57:54.976166Z"
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_delete_course_request:
    summary: 강의 요청 단일 삭제
    description: |
      러너가 생성한 강의 요청을 삭제합니다.  
      해당 요청은 데이터베이스 및 벡터 저장소(Pinecone 등)에서 함께 제거됩니다.
    tags: ["community"]
    security:
      - bearerAuth: []
    parameters:
      - name: request_id
        in: path
        required: true
        description: 삭제할 강의 요청의 ID
        schema:
          type: integer
          example: 11
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            example: {}
    responses:
      "200":
        description: 성공 (요청 삭제 완료)
        content:
          application/json:
            example:
              success: true
              data: null
      "403":
        description: 권한 없음 (다른 사용자의 요청일 경우)
        content:
          application/json:
            example:
              success: false
              error:
                code: "AI_COMMON_003"
                message: "해당 작업을 수행할 권한이 없습니다."
      "404":
        description: 존재하지 않는 요청 ID일 경우
        content:
          application/json:
            example:
              success: false
              error:
                code: "AI_COMMON_004"
                message: "요청한 리소스를 찾을 수 없습니다."
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_get_creator_recommendation_form:
    summary: 크리에이터 추천 폼 조회
    description: |
      강의 업로드 이력이 없는 크리에이터가, AI 기반 강의 요청 추천을 받기 위해 작성해야 하는 설문 폼(form)을 조회합니다.  
      이 폼은 크리에이터의 기술 환경, 도움 가능한 범위, 설치 가능한 소프트웨어 등을 기반으로 맞춤형 요청 추천에 활용됩니다.
      
      ---
      주요 기능
      - 프론트엔드는 이 API를 호출하여 폼 구조를 렌더링하고, 사용자의 응답을 `field_id`, `answer_option_ids`, `answer_text` 형태로 제출합니다.
      - 각 질문(필드)은 `checkbox`, `input_text`, `text_area` 등 다양한 타입으로 구성됩니다.
      - 모든 질문은 표시 순서(`order_no`)에 따라 프론트에서 정렬해 보여줄 수 있습니다.
      
      ---
      반환 필드 설명 (`form` 배열)
      
      | 필드명 | 타입 | 설명 |
      | --- | --- | --- |
      | `id` | `integer` | 각 질문(폼 필드)의 고유 ID. 사용자가 응답 제출 시 `field_id`로 사용됩니다. |
      | `field_key` | `string` | 백엔드 내부 매핑용 키. 프론트엔드에서는 표시하지 않아도 되며, `problem_context`, `goal` 등으로 구분됩니다. |
      | `label` | `string` | 사용자에게 표시할 질문 문구. 예: `"문제 상황/배경을 자세히 적어주세요."` |
      | `type` | `string` | 입력 타입: `radio`(단일 선택), `checkbox`(복수 선택), `input_text`(단답형 텍스트), `text_area`(장문형 입력) |
      | `is_required` | `boolean` | 필수 응답 여부. `true`면 반드시 응답해야 제출 가능 |
      | `order_no` | `integer` | 표시 순서 (낮을수록 먼저 표시됨) |
      | `options` | `array` | 선택지 목록. `checkbox` 타입에서만 존재하며, 각 항목은 `id`, `label`, `order_no`를 포함 |
      
      ---
    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            example: {}
    responses:
      "200":
        description: 성공 (폼 문항 반환)
        content:
          application/json:
            example:
              success: true
              data:
                form:
                  - id: 1
                    field_key: "problem_context"
                    label: "주로 어떤 문제 배경의 요청을 잘 도와주실 수 있나요?"
                    type: "input_text"
                    is_required: true
                    order_no: 1
                    options: []
                  - id: 2
                    field_key: "goal"
                    label: "어떤 학습 목표를 가진 요청자에게 강의 제공이 가능하신가요?"
                    type: "input_text"
                    is_required: true
                    order_no: 2
                    options: []
                  - id: 3
                    field_key: "current_attempt"
                    label: "요청자가 시도한 내용을 바탕으로 어떤 도움을 줄 수 있나요?"
                    type: "input_text"
                    is_required: true
                    order_no: 3
                    options: []
                  - id: 4
                    field_key: "ai_usage_level"
                    label: "주로 대응 가능한 AI 활용 수준을 선택해주세요."
                    type: "radio"
                    is_required: true
                    order_no: 4
                    options:
                      - id: 1
                        label: "Beginner"
                        order_no: 1
                      - id: 2
                        label: "Basic"
                        order_no: 2
                      - id: 3
                        label: "Intermediate"
                        order_no: 3
                      - id: 4
                        label: "Advanced"
                        order_no: 4
                  - id: 5
                    field_key: "desired_output"
                    label: "요청자가 어떤 결과물을 원할 때 가장 잘 도와주실 수 있나요?"
                    type: "input_text"
                    is_required: true
                    order_no: 5
                    options: []
                  - id: 6
                    field_key: "extra_context"
                    label: "추가로 전달하고 싶은 강의 스타일/경험이 있다면 적어주세요. (선택)"
                    type: "input_text"
                    is_required: false
                    order_no: 6
                    options: []
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_recommend_with_base:
    summary: (영상 기반) 강의 요청 추천
    description: |
      크리에이터가 업로드한 강의 내용을 기반으로,  
      AI가 러너의 강의 요청과 유사한 항목을 찾아 추천합니다.  
      추천 결과에는 요청 정보(`request_id`, `title`, `description`)와  
      추천 사유(`reason`)가 포함됩니다.
    tags: ["community"]
    security:
      - bearerAuth: []
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            example: {}
    responses:
      "200":
        description: 성공 (추천 결과 반환)
        content:
          application/json:
            example:
              success: true
              data:
                recommendations:
                  - request_id: 11
                    title: "마이크로소프트 계정을 이용한 프로그램 설치 방법 요청"
                    description: "MS 계정을 연동해서 Office나 Teams 같은 프로그램을 설치하는 과정이 헷갈려요."
                    selected_fields:
                      - field_key: "problem_context"
                        answer_text: "사내 환경에서 설치 권한 제약 때문에 진행이 자주 막힙니다."
                      - field_key: "goal"
                        answer_text: "초보자도 따라할 수 있는 안정적인 설치/세팅 절차를 익히고 싶습니다."
                      - field_key: "current_attempt"
