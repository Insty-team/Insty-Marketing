  community_update_recommendation_action_status:
    summary: 추천 강의 요청 상태 업데이트
    description: |
      추천된 강의 요청(`request_id`)에 대해 크리에이터가 수행한 액션 상태(`action_status`)를 업데이트합니다.  
      이 API는 크리에이터 추천 결과(`course_request_recommendation_results`)의 상태를 갱신하며,  
      프론트엔드에서 요청 수락, 거절, 완료 등의 사용자 행동을 반영하는 용도로 사용됩니다.
      
      ---
      **주요 기능**
      - 요청 ID(`request_id`)에 대해 `ACCEPTED`, `DECLINED`, `IGNORED`, `COMPLETED` 중 하나의 상태로 갱신
      - 상태 변경 시 `action_at`(UTC 기준 timestamp)이 자동 기록됨
      - 권한 검증: 해당 추천 요청이 로그인한 크리에이터의 요청이 아닐 경우 `403` 반환
      
      ---
      **상태 코드 설명**
      | 상태값 | 의미 | 예시 동작 |
      | --- | --- | --- |
      | `"ACCEPTED"` | 요청 수락 | 강의 업로드 페이지로 이동 시 |
      | `"DECLINED"` | 요청 거절 | 추천 요청 리스트에서 X버튼 클릭 또는 업로드 중단 시 |
      | `"IGNORED"` | 무응답 상태 (기본값) | 사용자가 아직 반응하지 않은 상태 |
      | `"COMPLETED"` | 후속 조치 완료 | 강의 업로드 완료 후 처리됨 |
      
      ---
      **요청 경로 예시**
      ```
      PATCH /api/v1/ai/community/course-request-recommendation/11/status
      ```
      
      ---
      **응답 필드 설명**
      | 필드 | 타입 | 설명 |
      | --- | --- | --- |
      | `request_id` | `integer` | 상태가 변경된 추천 요청 ID |
      | `action_status` | `string` | 최종 반영된 상태값 |
      | `action_at` | `string (ISO8601)` | 상태 변경 시각 (UTC 기준 ISO8601 timestamp) |
      
      ---
      **추가 참고**
      - `action_status`는 서버에서 유효성 검증(`Enum`)을 거치며, 허용되지 않은 값은 `422` 오류 반환
      - 상태 변경은 비가역적이지 않으며, 동일 요청에 대해 여러 번 호출 가능 (상태 갱신)
    tags: ["community"]
    security:
      - bearerAuth: []
    parameters:
      - name: request_id
        in: path
        required: true
        description: 상태를 업데이트할 요청 ID
        schema:
          type: integer
          example: 11
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              action_status:
                type: string
                enum: ["ACCEPTED", "DECLINED", "IGNORED", "COMPLETED"]
                example: "ACCEPTED"
          example:
            action_status: "ACCEPTED"
    responses:
      "200":
        description: 성공 (상태 업데이트 완료)
        content:
          application/json:
            example:
              success: true
              data:
                request_id: 11
                action_status: "ACCEPTED"
                action_at: "2025-09-09T19:11:45.123Z"
      "403":
        description: 권한 없음 (다른 크리에이터의 요청)
        content:
          application/json:
            example:
              success: false
              error:
                code: "AI_COMMON_003"
                message: "해당 작업을 수행할 권한이 없습니다."
      "404":
        description: 존재하지 않는 추천 요청 ID일 경우
        content:
          application/json:
            example:
              success: false
              error:
                code: "AI_COMMON_004"
                message: "요청한 리소스를 찾을 수 없습니다."
      "422":
        description: action_status 값이 허용되지 않은 경우
        content:
          application/json:
            example:
              success: false
              error:
                code: "AI_COMMON_007"
                message: "파라검증에 실패했습니다."
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  community_check_course_request_availability:
    summary: 강의 요청 업로드 가능 여부 조회
    description: |
      크리에이터가 특정 강의 요청(`request_id`)에 대해 **현재 강의 업로드 페이지로 진입 가능한 상태인지**를 확인합니다.  
      내부적으로 추천 결과(`course_request_recommendation_results`)의 상태(`action_status`)를 기반으로 판별하며,  
      하나라도 `ACCEPTED` 또는 `COMPLETED` 상태인 요청은 업로드 불가(`available=false`)로 반환됩니다.
      
      ---
      **주요 기능**
      - 추천 결과 테이블의 상태(`action_status`)를 조회하여, 현재 요청이 업로드 가능한지 판단합니다.
      - 요청이 아직 추천된 적이 없거나, 이미 다른 크리에이터가 수락/완료한 경우 업로드가 제한됩니다.
      - 프론트엔드는 `available`이 `false`일 경우 업로드 페이지 진입을 차단해야 합니다.
      
      ---
      **상태 판단 기준**
      | 조합 | 반환 `status` | `available` | 설명 |
      | --- | --- | --- | --- |
      | 추천 이력 없음 | `"NOT_RECOMMENDED"` | `false` | 아직 추천된 적 없음 |
      | 모두 `IGNORED` | `"IGNORED"` | `true` | 추천되었으나 반응 없음, 업로드 가능 |
      | `IGNORED` + `DECLINED` 만 존재 | `"DECLINED"` | `true` | 업로드 가능 (이전 거절 이력 무시) |
      | `DECLINED` 만 존재 | `"DECLINED"` | `true` | 업로드 가능 |
      | 하나라도 `ACCEPTED` 포함 | `"ACCEPTED"` | `false` | 이미 수락 상태, 중복 업로드 불가 |
      | 하나라도 `COMPLETED` 포함 | `"COMPLETED"` | `false` | 이미 강의 업로드 완료 |
      | 알 수 없는 조합 | `"UNKNOWN"` | `false` | 비정상 데이터 조합 (관리자 검토 필요) |
      
      ---
      **응답 필드 설명**
      | 필드명 | 타입 | 설명 |
      | --- | --- | --- |
      | `available` | `boolean` | 강의 업로드 가능 여부 |
      | `status` | `string` | 업로드 가능 여부를 결정하는 대표 상태 (`IGNORED`, `DECLINED`, `ACCEPTED`, `COMPLETED`, `NOT_RECOMMENDED`, `UNKNOWN`) |
      
      ---
      **추가 참고**
      - 이 API는 강의 업로드 진입 전 사전 검증용으로 사용됩니다.  
      - `available=false`일 경우, 프론트엔드에서 업로드 버튼 비활성화 또는 재추천 갱신을 유도해야 합니다.
      - 내부적으로 `CourseRequestRecommendationService.check_request_availability()` 메서드를 사용합니다.
    tags: ["community"]
    security:
      - bearerAuth: []
    parameters:
      - name: request_id
        in: path
        required: true
        description: 업로드 가능 여부를 확인할 강의 요청 ID
        schema:
          type: integer
          example: 11
    responses:
      "200":
        description: 성공 (업로드 가능 여부 반환)
        content:
          application/json:
            example:
              success: true
              data:
                available: true
                status: "DECLINED"
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "404":
        description: 존재하지 않는 request_id
        content:
          application/json:
            example:
              success: false
              error:
                code: "AI_COMMON_004"
                message: "요청한 리소스를 찾을 수 없습니다."
      "500":
        $ref: "#/components/responses/InternalServerError"

