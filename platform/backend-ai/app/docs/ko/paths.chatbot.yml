paths:
  ai_chatbot_init_session:
    summary: 채팅 세션 생성
    description: |
      사용자의 강의 ID를 기반으로 새로운 채팅 세션을 생성합니다.  
      기존 세션이 없으면 새로 생성되고, 이미 존재하면 기존 세션 정보를 반환합니다.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              course_id:
                type: integer
                example: 4
    responses:
      "200":
        description: 세션 생성 성공
        content:
          application/json:
            examples:
              new_session:
                summary: 새 세션 생성 시
                value:
                  success: true
                  data:
                    session_id: 5
                    course_id: 5
                    status: "active"
                    created_at: "2025-06-01T16:01:30.071084Z"
                    is_new: true
              existing_session:
                summary: 기존 세션 존재 시
                value:
                  success: true
                  data:
                    session_id: 4
                    course_id: 4
                    status: "active"
                    created_at: "2025-06-01T15:39:50.219820Z"
                    is_new: false

  ai_chatbot_list_user_sessions:
    summary: 사용자 세션 목록 조회
    description: 로그인된 사용자가 가진 모든 챗봇 세션을 조회합니다.
    responses:
      "200":
        description: 세션 목록 조회 성공
        content:
          application/json:
            example:
              - session_id: 4
                course_id: 4
                status: "active"
                created_at: "2025-06-01T15:39:50.219820Z"
                ended_at: null
              - session_id: 3
                course_id: 3
                status: "active"
                created_at: "2025-06-01T14:51:30.151016Z"
                ended_at: null
              - session_id: 1
                course_id: 1
                status: "active"
                created_at: "2025-06-01T14:32:45.392660Z"
                ended_at: "2025-06-01T14:32:45.392660Z"

  ai_chatbot_post_message:
    summary: 챗봇 메시지 전송 (legacy)
    description: |
      LLM 기반 챗봇 메시지를 전송하고 응답을 받는 엔드포인트입니다.  
      현재는 스트리밍 방식으로 대체되어 사용하지 않습니다.
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
              course_id:
                type: integer
              message_text:
                type: string
              has_attachment:
                type: boolean
                default: false
          example:
            course_id: 4
            message_text: "이 강의 핵심 요약해줘"
            file: null
    responses:
      "200":
        description: 메시지 전송 성공
        content:
          application/json:
            example:
              success: true
              data:
                message_id: 42
                sender: "assistant"
                content: "이미지로 본 해당 강의는...<br>추가적으로 이런 내용으로 구성됩니다."
                created_at: "2025-06-04T11:20:31.104Z"

  ai_chatbot_post_message_stream:
    summary: 챗봇 메시지 전송 (스트리밍)
    description: |
      신형 챗봇 엔진에 메시지를 전송하고, 응답을 스트리밍(SSE) 형태로 수신합니다.  
      파일 첨부와 텍스트 입력 모두 지원합니다.
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
              course_id:
                type: integer
              message_text:
                type: string
              has_attachment:
                type: boolean
          example:
            course_id: 4
            message_text: "이 강의 핵심 포인트를 요약해줘"
            file: null
    responses:
      "200":
        description: 스트리밍 응답 성공
        content:
          application/json:
            example:
              success: true
              data:
                message_id: 42
                sender: "assistant"
                content: "요약 내용: ...<br>이런 식으로 응답이 반환됩니다."
                created_at: "2025-06-04T11:20:31.104Z"

  ai_chatbot_get_session_messages:
    summary: 세션 메시지 목록 조회
    description: 특정 세션의 전체 질문/응답 내역을 조회합니다.
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: integer
          example: 6
    responses:
      "200":
        description: 세션 메시지 목록 조회 성공
        content:
          application/json:
            example:
              success: true
              data:
                session_id: 6
                course_id: 2005
                messages:
                  - message_id: 81
                    sender: "user"
                    content: "이 사진 뭐야?"
                    created_at: "2025-06-04T15:13:36.738729Z"
                    attachments:
                      - file_url: "https://dev.insty.ai.kr/chat-attachments/session_6/message_81_306db4d926bc4fbc938eadc0ad91c8de.jpg"
                        file_type: "image/jpeg"
                        file_size: 86933
                        file_name: "banner_2.jpg"
                  - message_id: 83
                    sender: "assistant"
                    content: "이 이미지는 구찌 브랜드전의 광고를 나타내고 있습니다..."
                    created_at: "2025-06-04T15:20:06.474928Z"
                    attachments: []

  ai_chatbot_mark_session_installed:
    summary: 세션 설치 완료 처리
    description: 해당 세션(질문)에 대한 설치 완료 상태를 업데이트합니다.
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              is_installed:
                type: boolean
          example:
            is_installed: true
    responses:
      "200":
        description: 성공 (상태 토글)
        content:
          application/json:
            examples:
              checked:
                summary: 설치 완료 표시
                value:
                  success: true
                  data:
                    session_id: 3
                    is_installed: true
              unchecked:
                summary: 설치 해제
                value:
                  success: true
                  data:
                    session_id: 3
                    is_installed: false

  ai_chatbot_get_question_history_grouped:
    summary: 사용자 질문 이력 조회
    description: |
      마이페이지에서 날짜별 / 키워드별로 사용자의 질문 이력을 조회합니다.  
      `date`, `relativeDate`, `keyword` 쿼리 파라미터를 사용할 수 있습니다.
    parameters:
      - name: date
        in: query
        schema:
          type: string
          format: date
          example: "2025-06-10"
      - name: keyword
        in: query
        schema:
          type: string
          example: "fastapi"
    responses:
      "200":
        description: 히스토리 조회 성공
        content:
          application/json:
            example:
              success: true
              data:
                question_history_by_date:
                  - date: "2025-06-10"
                    questions:
                      - session_id: 1
                        course_title: "FastAPI 마스터클래스"
                        message_id: 12
                        question_text: "fastapi에서 query parameter는 어떻게 처리하나요?"
                      - session_id: 1
                        course_title: "FastAPI 마스터클래스"
                        message_id: 13
                        question_text: "의존성 주입이 뭐예요?"
                  - date: "2025-06-09"
                    questions:
                      - session_id: 2
                        course_title: "프론트엔드 기초"
                        message_id: 8
                        question_text: "자바스크립트 이벤트 루프 설명해주세요"
