paths:
  ai_search_recommend:
    summary: AI 기반 영상 추천 수행
    description: >
      사용자의 입력 쿼리를 기반으로 AI가 유사한 강의를 찾아 추천합니다.  
      사용자가 입력한 자연어 문장을 분석하여 가장 관련성 높은 강의 목록을 반환합니다.
    tags: ["search"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: string
                description: 사용자가 입력한 검색 문장
                example: "나는 도커 관련 영상을 찾고 있어"
    responses:
      "200":
        description: 성공 (추천할 영상이 있을 시)
        content:
          application/json:
            examples:
              success_with_courses:
                summary: 추천 결과 있음
                value:
                  success: true
                  data:
                    message: "도커에 대해 배우고 싶으시군요! 그럼 '영상 1'을 추천드리고 싶습니다..."
                    courses:
                      - course_id: "2004"
                        course_title: "docker_install.mp4"
                        thumbnail_url: "https://insty-dev.s3.ap-northeast-2.amazonaws.com/test_folder/docker_install.mp4"
                      - course_id: "2005"
                        course_title: "git_install.mp4"
                        thumbnail_url: "https://insty-dev.s3.ap-northeast-2.amazonaws.com/test_folder/git_install.mp4"
                      - course_id: "2000"
                        course_title: "cuda_install.mp4"
                        thumbnail_url: "https://insty-dev.s3.ap-northeast-2.amazonaws.com/test_folder/cuda_install.mp4"
              success_no_courses:
                summary: 추천 결과 없음
                value:
                  success: true
                  data:
                    message: "관련된 영상을 찾을 수 없습니다. 직접 찾아보시거나 제작 요청 하시겠어요?"
                    video_ids: []
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  ai_search_recommend_history:
    summary: AI 기반 영상 추천 내역 조회
    description: >
      사용자가 이전에 요청한 영상 추천 대화 이력을 조회합니다.  
      각 메시지의 송신자, 생성 시각, 추천된 강의 목록 등이 함께 반환됩니다.
    tags: ["search"]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: 성공
        content:
          application/json:
            examples:
              success:
                summary: 추천 이력 조회 성공
                value:
                  success: true
                  data:
                    messages:
                      - message_id: 101
                        sender: "user"
                        content: "리액트 강의 추천해줘"
                        created_at: "2025-06-26T09:00:00.000Z"
                      - message_id: 102
                        sender: "assistant"
                        courses:
                          - course_id: "301"
                            course_title: "react_setup.mp4"
                            thumbnail_url: "https://cdn.example.com/file/COURSE_THUMBNAIL/301/react.png"
                          - course_id: "302"
                            course_title: "vite_basics.mp4"
                            thumbnail_url: null
                        content: "React 환경 설정 및 Vite에 대한 기초 강의를 추천드립니다."
                        created_at: "2025-06-26T09:00:03.000Z"
                      - message_id: 103
                        sender: "user"
                        content: "docker 설치 강의도 보여줘"
                        created_at: "2025-06-26T09:02:15.000Z"
                      - message_id: 104
                        sender: "assistant"
                        courses:
                          - course_id: "401"
                            course_title: "docker_install.mp4"
                            thumbnail_url: "https://cdn.example.com/file/COURSE_THUMBNAIL/401/docker.jpg"
                        content: "Docker 설치 과정을 자세히 설명한 강의를 추천드려요."
                        created_at: "2025-06-26T09:02:17.000Z"
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"

  ai_search_recommend_services:
    summary: AI 서비스 및 관련 강의 추천
    description: >
      사용자의 질문을 기반으로 관련된 외부 AI 서비스를 추천하고, 각 서비스별로 관련된 내부 강의를 함께 추천합니다.
      웹 검색을 통해 외부 AI 서비스를 찾고, Pinecone 벡터 검색을 통해 각 서비스와 관련된 내부 강의를 찾아 제공합니다.
    tags: ["search"]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: string
                description: 사용자가 입력한 질문
                example: "이미지 생성 AI 도구 추천해줘"
    responses:
      "200":
        description: 성공
        content:
          application/json:
            example:
              success: true
              data:
                message: "이미지 생성 AI 도구를 찾고 계시는군요! 추천드리는 서비스들은 다음과 같습니다..."
                services:
                  - title: "DALL-E - AI Image Generator"
                    url: "https://openai.com/dall-e"
                    description: "OpenAI에서 개발한 이미지 생성 AI"
                    type: "external_service"
                    courses:
                      - course_id: "123"
                        course_title: "DALL-E API 활용하기"
                        thumbnail_url: "https://..."
                  - title: "Midjourney"
                    url: "https://midjourney.com"
                    description: "AI 아트 생성 도구"
                    type: "external_service"
                    courses:
                      - course_id: "456"
                        course_title: "Midjourney 프롬프트 엔지니어링"
                        thumbnail_url: "https://..."
      "400":
        $ref: "#/components/responses/BadRequest"
      "401":
        $ref: "#/components/responses/Unauthorized"
      "500":
        $ref: "#/components/responses/InternalServerError"
